apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-java-app
  namespace: simple-java
spec:
  replicas: 2
  selector:
    matchLabels:
      app: simple-java
  template:
    metadata:
      labels:
        app: simple-java
    spec:
      containers:
      - name: app
        image: <your-dockerhub-username>/simple-java-app:v1.0
        ports:
        - containerPort: 8080
